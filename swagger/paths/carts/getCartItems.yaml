tags:
  - Carts
summary: Get cart items for a user
operationId: getCartItems
description: Returns the cart of the currently authenticated user, including populated product details.
security:
  - cookieAuth: []
responses:
  '200':
    description: Cart fetched successfully
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Cart fetched successfully
            data:
              $ref: '../../components/schemas/cartPopulated.yaml'
  '400':
    $ref: ../../components/responses/400.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml