tags:
  - Auth
summary: Login user
operationId: loginUser
description: Login user with email and password
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            type: string
            format: email
            example: user@gmail.com
          password:
            type: string
            minLength: 8
            maxLength: 50
            pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&]).{8,64}$"
            example: StrongPass1!
responses:
  '200':
    description: Successfully logged in and set cookies
    headers:
      Set-Cookie:
        description: >
          HTTP-only cookies: accessToken, refreshToken, sessionId
        schema:
          type: string
          example: accessToken=abc; HttpOnly;
    content:
      application/json:
        schema:
          type: object
          required: [status, message, data]
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully logged in an user!
            data:
              $ref: '../../components/schemas/userPublic.yaml'
  '400':
    $ref: ../../components/responses/400.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml
