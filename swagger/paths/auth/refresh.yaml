tags:
  - Auth
summary: Refresh session
operationId: refreshUserSession
description: Refresh the user session
security:
  - cookieAuth: []
responses:
  '200':
    description: Successfully refreshed session
    headers:
      Set-Cookie:
        description: Updated authentication cookies
        schema:
          type: string
          example: accessToken=newToken; HttpOnly
    content:
      application/json:
        schema:
          type: object
          required: [status, message]
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully refreshed a session!
  '401':
    $ref: ../../components/responses/401.yaml
  '500':
    $ref: ../../components/responses/500.yaml
