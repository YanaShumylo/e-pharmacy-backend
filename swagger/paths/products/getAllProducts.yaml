tags:
  - Products
summary: Get list of products
operationId: getAllProducts
description: Public endpoint. Supports pagination and filtering by category and search query.
security: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      default: 1
    description: Page number
  - in: query
    name: limit
    schema:
      type: integer
      default: 12
    description: Number of products per page
  - in: query
    name: category
    schema:
      type: string
      enum:
        - heart
        - medicine
        - head
        - hand
        - leg
    description: Filter products by category
  - in: query
    name: search
    schema:
      type: string
    description: Search products by name (case insensitive)
responses:
  '200':
    description: List of products with pagination and filters
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
            - page
            - limit
            - totalItems
            - totalPages
            - hasNextPage
            - hasPreviousPage
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found products!
            data:
              type: array
              items:
                $ref: '../../components/schemas/product.yaml'
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 12
            totalItems:
              type: integer
              example: 36
            totalPages:
              type: integer
              example: 3
            hasNextPage:
              type: boolean
              example: true
            hasPreviousPage:
              type: boolean
              example: false
  '400':
    $ref: ../../components/responses/400.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml