tags:
  - Reviews
summary: Get list of reviews
operationId: getAllReviews
description: Public endpoint. Supports pagination.
security: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      default: 1
    description: Page number
  - in: query
    name: limit
    schema:
      type: integer
      default: 12
    description: Number of reviews per page
responses:
  '200':
    description: List of reviews with pagination
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
            - page
            - limit
            - totalItems
            - totalPages
            - hasNextPage
            - hasPreviousPage
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found reviews!
            data:
              type: array
              items:
                $ref: '../../components/schemas/review.yaml'
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 12
            totalItems:
              type: integer
              example: 24
            totalPages:
              type: integer
              example: 2
            hasNextPage:
              type: boolean
              example: true
            hasPreviousPage:
              type: boolean
              example: false
  '400':
    $ref: ../../components/responses/400.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml